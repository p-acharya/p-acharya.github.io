<!doctype html>
<html lang="en" class="bg-background">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="white" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="black" media="(prefers-color-scheme: dark)" />

    <link rel="apple-touch-icon" href="{{ '/images/apple-icon.png' | relative_url }}" />
    <link rel="icon" href="{{ '/images/icon-light-32x32.png' | relative_url }}" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="{{ '/images/icon-dark-32x32.png' | relative_url }}" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="{{ '/images/icon.svg' | relative_url }}" type="image/svg+xml" />

    <!-- Fonts: Newsreader (serif display), Geist (sans), Geist Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  </head>
  <body class="font-sans antialiased">
    {% include nav.html %}
    {{ content }}
  </body>
</html>
