  text: >-
    Paper accepted at <strong>EMNLP 2025</strong>, introducing an automated pipeline to trace persistent native-language influence in ESL writing. 
- date: "2025-06"
  label: Jun 2025
  text: >-
    Visiting researcher at <strong>ETH Zürich</strong>, developing computational methods to optimize Chinese character learning for L2 learners by taking advantage of compositionality in the writing system (supervised by Mrinmaya Sachan and Ryan Cotterell).
