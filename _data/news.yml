  text: >-
    Visiting researcher at <strong>MIT's Computational Psycholinguistics Lab</strong>, modeling language learning as a belief-updating process: one's native language sets initial expectations for how meaning is signaled (e.g. tone vs. word order), and these are updated as proficiency in a new language grows. (supervised by Roger Levy)
- date: "2025-11"
