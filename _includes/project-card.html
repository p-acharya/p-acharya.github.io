{%- assign p = include.project -%}
<a href="{{ p.href }}" class="card{% if p.featured %} featured{% endif %}" data-accent="{{ p.accent }}">
  <div class="card__visual" data-accent="{{ p.accent }}">
    <span class="card__index accent-{{ p.accent }}">{{ p.index }}</span>
    <div class="card__visual-inner">
      {% include visuals/{{ p.visual }}.html %}
    </div>
  </div>

  <div class="card__body">
    <div class="card__meta">
      <span class="tag accent-{{ p.accent }}">{{ p.venue }}</span>
      <span class="affiliation">{{ p.affiliation }}</span>
    </div>
    <h3 class="card__title">{{ p.title }}</h3>
    <p class="card__hook">{{ p.hook }}</p>
    <span class="card__more">
      Read more
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="7" y1="17" x2="17" y2="7"></line>
        <polyline points="7 7 17 7 17 17"></polyline>
      </svg>
    </span>
  </div>
</a>
